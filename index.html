  <!-- Clerk auth — hot-loaded from the project's Clerk Frontend API (buildless).
       The publishable key is a public client value (safe to embed); the secret
       key lives only in server env (Vercel) and never touches the browser. -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_live_Y2xlcmsuc3RhcnhpLmlvJA"
    src="https://clerk.starxi.io/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  ></script>
  <script>
    // window.clerkReady resolves to the loaded Clerk instance once the async
    // SDK above lands on the page. Guarded so Clerk.load() runs at most once.
    window.clerkReady = new Promise(function (resolve) {
      var loading = false;
      (function poll() {
        if (window.Clerk) {
          if (window.Clerk.loaded) { resolve(window.Clerk); return; }
          if (!loading) {
            loading = true;
            window.Clerk.load({
              routerPush:    function (to) { history.pushState({}, '', to); },
              routerReplace: function (to) { history.replaceState({}, '', to); },
              // Dark STAR XI brand theme for all Clerk UI (sign-in, sign-up,
              // user button) so the modal reads as native, not stock white.
              appearance: {
                variables: {
                  colorPrimary: "#19A85A",
                  colorBackground: "#101C14",
                  colorText: "#FFFFFF",
                  colorTextSecondary: "rgba(255,255,255,0.60)",
                  colorTextOnPrimaryBackground: "#08130D",
                  colorInputBackground: "rgba(255,255,255,0.06)",
                  colorInputText: "#FFFFFF",
                  colorNeutral: "#FFFFFF",
                  colorShimmer: "rgba(255,255,255,0.10)",
                  borderRadius: "14px",
                  fontFamily: "Inter, system-ui, sans-serif",
                },
                elements: {
                  card: { boxShadow: "0 24px 70px rgba(0,0,0,0.55)", border: "1px solid rgba(255,255,255,0.08)" },
                  socialButtonsBlockButton: { border: "1px solid rgba(255,255,255,0.16)" },
                  formButtonPrimary: { fontWeight: "700", letterSpacing: "0.02em" },
                },
              },
            })
              .then(function () { resolve(window.Clerk); })
              .catch(function () { resolve(window.Clerk); });
            return;
          }
        }
        setTimeout(poll, 50);
      })();
    });
  </script>
  <script>
    // League invite deep link: starxi.io/join/CODE (or ?join=CODE). Stash the
    // code so the app can auto-join once the player is signed in, then tidy the
    // URL so a refresh doesn't re-fire it.
    (function () {
      try {
        var code = null;
        var m = location.pathname.match(/^\/join\/([A-Za-z0-9]{4,8})\/?$/);
        if (m) code = m[1];
        if (!code) { var q = new URLSearchParams(location.search).get("join"); if (q) code = q; }
        if (code) {
          window.__STARXI_JOIN = code.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 8);
          history.replaceState({}, "", "/");
        }
      } catch (e) {}
    })();
  </script>
