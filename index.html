  <!-- Clerk auth — hot-loaded from the project's Clerk Frontend API (buildless).
       The publishable key is a public client value (safe to embed); the secret
       key lives only in server env (Vercel) and never touches the browser. -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y3VyaW91cy1iZWFnbGUtODYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://curious-beagle-86.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  ></script>
  <script>
    // window.clerkReady resolves to the loaded Clerk instance once the async
    // SDK above lands on the page. Guarded so Clerk.load() runs at most once.
    window.clerkReady = new Promise(function (resolve) {
      var loading = false;
      (function poll() {
        if (window.Clerk) {
          if (window.Clerk.loaded) { resolve(window.Clerk); return; }
          if (!loading) {
            loading = true;
            window.Clerk.load({
              routerPush:    function (to) { history.pushState({}, '', to); },
              routerReplace: function (to) { history.replaceState({}, '', to); },
            })
              .then(function () { resolve(window.Clerk); })
              .catch(function () { resolve(window.Clerk); });
            return;
          }
        }
        setTimeout(poll, 50);
      })();
    });
  </script>

       default swatch (which loads the original figure). -->
