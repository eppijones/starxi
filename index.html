<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WORLD CUP XI (WCXI) — fan-made prediction & squad game</title>
  <meta name="description" content="WORLD CUP XI — an independent, fan-made prediction + Dream XI squad game for the summer of '26. Not affiliated with, endorsed by, or licensed by FIFA." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="festival/styles.css?v=20260530l" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Clerk auth — hot-loaded from the project's Clerk Frontend API (buildless).
       The publishable key is a public client value (safe to embed); the secret
       key lives only in server env (Vercel) and never touches the browser. -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y3VyaW91cy1iZWFnbGUtODYuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://curious-beagle-86.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  ></script>
  <script>
    // window.clerkReady resolves to the loaded Clerk instance once the async
    // SDK above lands on the page. Guarded so Clerk.load() runs at most once.
    window.clerkReady = new Promise(function (resolve) {
      var loading = false;
      (function poll() {
        if (window.Clerk) {
          if (window.Clerk.loaded) { resolve(window.Clerk); return; }
          if (!loading) {
            loading = true;
            window.Clerk.load()
              .then(function () { resolve(window.Clerk); })
              .catch(function () { resolve(window.Clerk); });
            return;
          }
        }
        setTimeout(poll, 50);
      })();
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Data first (plain JS, sets globals) -->
  <!-- ?v= cache-bust: no build step, so bump this token on every deploy
       to force returning visitors past the browser's heuristic cache. -->
  <script src="festival/data.js?v=20260530l"></script>
  <!-- Shared live-results mapper (plain JS): one payload->fixtures impl for
       browser + /api leaderboard. Must load before live-data.js. -->
  <script src="festival/results-map.js?v=20260530l"></script>
  <!-- Live results glue (plain JS): maps /api/results onto our fixtures -->
  <script src="festival/live-data.js?v=20260530l"></script>
  <!-- Entry persistence glue (plain JS): save/load entries via /api/entry -->
  <script src="festival/api.js?v=20260530l"></script>
  <!-- Shared scoring core (plain JS): one scoring impl for browser + /api -->
  <script src="festival/scoring-core.js?v=20260530l"></script>

  <!-- Helpers, extras, then per-screen, then app -->
  <script type="text/babel" src="festival/helpers.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/extras.jsx?v=20260530l"></script>
  <!-- Clerk React surface (hook + nav controls). After helpers (hooks), before app. -->
  <script type="text/babel" src="festival/auth.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/Welcome.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/Predict.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/DreamXI.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/Confirm.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/Live.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/History.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/Leaderboard.jsx?v=20260530l"></script>
  <script type="text/babel" src="festival/app.jsx?v=20260530l"></script>
</body>
</html>
